<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Profissional</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Minha Lista de Tarefas</h1>
            <p class="subtitle">Organize seu tempo e aumente sua produtividade</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Descrição da tarefa..." maxlength="50">
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label for="entry-time">🕐 Horário de Entrada:</label>
                    <input type="time" id="entry-time">
                </div>
                <div class="input-group">
                    <label for="duration">⏱️ Duração (minutos):</label>
                    <input type="number" id="duration" placeholder="30" min="1" max="480">
                </div>
            </div>
            <button id="add-task" class="btn-add">➕ Adicionar Tarefa</button>
        </div>

        <div class="stats">
            <span id="task-count">Tarefas: 0</span>
            <span id="total-time">Tempo total: 0h</span>
        </div>

        <ul id="task-list" class="task-list"></ul>

        <div id="empty-state" class="empty-state">
            <p>✨ Nenhuma tarefa ainda. Comece agora!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
