<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h1>TaskFlow</h1>

    <div class="card">
      <p>Total</p>
      <h3 id="totalTasks">0</h3>
    </div>

    <div class="card">
      <p>Carga</p>
      <h3 id="dayLoad">0 min</h3>
    </div>

    <div class="card focus">
      <h4>🎯 Foco</h4>
      <p id="focusTask">Nenhuma tarefa</p>
    </div>

    <button id="themeToggle">Tema</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- INPUT -->
    <section class="input">
      <input id="taskInput" placeholder="Nova tarefa">

      <div class="row">
        <input type="datetime-local" id="startInput">
        <input type="datetime-local" id="endInput">
      </div>

      <select id="priorityInput">
        <option value="1">Baixa</option>
        <option value="2">Média</option>
        <option value="3">Alta</option>
      </select>

      <button id="addBtn">Adicionar</button>
    </section>

    <!-- TIMELINE -->
    <section id="timeline" class="timeline"></section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
