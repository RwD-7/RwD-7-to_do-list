<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow GOD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="particles"></canvas>

<main class="app">

  <header>
    <h1>TaskFlow</h1>
    <p>Ultra Focus System</p>
  </header>

  <section class="input">
    <input id="task-input" placeholder="Digite sua missão...">

    <div class="row">
      <input type="time" id="time">
      <input type="number" id="duration" placeholder="min">
    </div>

    <button id="add">Adicionar</button>
  </section>

  <section class="controls">
    <button data-filter="all">Tudo</button>
    <button data-filter="active">Ativas</button>
    <button data-filter="done">Concluídas</button>
  </section>

  <section id="stats"></section>

  <ul id="list"></ul>

  <div id="empty"></div>

</main>

<script src="script.js"></script>
</body>
</html>
